<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchiGent | Integrated IFC Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- 사이드바 / 제어판 -->
        <aside class="glass-panel" id="control-panel">
            <header>
                <h1>ArchiGent</h1>
                <p>Advanced BIM Agentic Workflow</p>
            </header>

            <section class="file-selection">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label for="file-select" style="margin-bottom: 0;">IFC 파일 선택</label>
                    <button id="refresh-files-btn" style="background: none; border: none; color: var(--accent-color); cursor: pointer; font-size: 11px;">🔄 새로고침</button>
                </div>
                <select id="file-select">
                    <option value="">파일을 불러오는 중...</option>
                </select>
            </section>

            <section class="bim-tools">
                <label>BIM 통합 도구</label>
                <div class="tool-group">
                    <button id="measure-btn" title="거리 측정">📏</button>
                    <button id="clip-btn" title="정밀 단면">✂️</button>
                    <button id="tree-btn" title="계층 구조">🌳</button>
                    <button id="props-btn" title="속성 정보">ℹ️</button>
                    <button id="reset-cam-btn" title="뷰 초기화">📷</button>
                </div>
            </section>

            <section class="system-controls">
                <button id="toggle-audit-btn" class="secondary-btn">Compliance Audit Trail</button>
                <button id="toggle-logs-btn" class="secondary-btn">System Logs</button>
            </section>

            <section class="chat-interface" id="chat-interface">
                <div id="chat-history">
                    <div class="chat-msg assistant">
                        <div class="msg-content">안녕하세요! ArchiGent입니다.<br>원하는 BIM 모델 변경 사항을 말씀해주세요.</div>
                    </div>
                </div>

                <div id="status-stepper" class="hidden">
                    <div class="step" data-node="analyzer">Analyzer</div>
                    <div class="step" data-node="planner">Planner</div>
                    <div class="step" data-node="coder">Coder</div>
                    <div class="step" data-node="reviewer">Reviewer</div>
                    <div class="step" data-node="verifier">Verifier</div>
                </div>

                <div class="chat-input-wrapper">
                    <textarea id="user-request" placeholder="IFC 수정 요청을 입력하세요..." rows="1"></textarea>
                    <button id="run-btn" class="send-btn" title="전송">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </section>

            <!-- Drawers (Hidden by default) -->
            <div id="audit-drawer" class="drawer hidden">
                <div class="drawer-header">
                    <h3>Compliance Audit Trail</h3>
                    <button class="close-drawer-btn" data-target="audit-drawer">✕</button>
                </div>
                <div id="audit-log-container">
                    <div class="audit-placeholder">대기 중...</div>
                </div>
            </div>

            <div id="logs-drawer" class="drawer hidden">
                <div class="drawer-header">
                    <h3>System Logs</h3>
                    <button class="close-drawer-btn" data-target="logs-drawer">✕</button>
                </div>
                <div id="log-output"></div>
            </div>
        </aside>

        <!-- 3D 뷰어 영역 -->
        <main id="viewers-container">
            <div id="original-viewer" class="viewer-wrapper">
                <div class="viewer-label">Original IFC</div>
                <canvas id="canvas-original" class="viewer-canvas"></canvas>
            </div>
            <div id="result-viewer" class="viewer-wrapper">
                <div class="viewer-label">Result / Alternatives</div>
                <div class="viewer-controls">
                    <button id="diff-toggle" class="toggle-btn" title="원본과 비교">DIFF</button>
                </div>
                <canvas id="canvas-result" class="viewer-canvas"></canvas>
            </div>
        </main>

        <!-- 알림/상태 오버레이 -->
        <div id="overlay" class="hidden">
            <div class="spinner"></div>
            <p id="overlay-msg">처리 중...</p>
        </div>
    </div>

    <!-- ArchiGent Dashboard Script -->
    <!-- ESM 기반 최신 엔진 구성 -->
    <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.160.0",
        "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/",
        "web-ifc": "https://cdn.jsdelivr.net/npm/web-ifc@0.0.76/+esm"
      }
    }
    </script>
    <script type="module" src="/static/app.js?v=4"></script>
</body>
</html>
